# This is a fork of the recipe UpgradeSpringBoot_3_1 from OpenRewrite, with the only difference that the Java 8-to-11-to-17
# migration is skipped. This migration is optional when updating to Spring Boot 3, and enlarges the changeset considerably.
---
type: specs.openrewrite.org/v1beta/recipe
name: ch.admin.bit.jeap.openrewrite.recipe.UpgradeSpringBoot_3_1_NoJava17Migration
displayName: Migrate to Spring Boot 3.1
description: 'Upgrade to Spring Boot 3.1'
tags:
  - spring
  - boot
recipeList:
  - ch.admin.bit.jeap.openrewrite.recipe.UpgradeSpringBoot_3_0_NoJava17Migration
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.springframework.boot
      artifactId: "*"
      newVersion: 3.1.x
      overrideManagedVersion: false
  - org.openrewrite.maven.UpgradeParentVersion:
      groupId: org.springframework.boot
      artifactId: spring-boot-starter-parent
      newVersion: 3.1.x
  - org.openrewrite.gradle.plugins.UpgradePluginVersion:
      pluginIdPattern: org.springframework.boot
      newVersion: 3.1.x
  - org.openrewrite.java.spring.boot3.SpringBootProperties_3_1